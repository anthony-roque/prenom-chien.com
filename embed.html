<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Générateur de prénoms de chien</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%90%BE%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/css/style.css">
  <script>
  (function(){
    var p = new URLSearchParams(window.location.search);
    var map = {
      primary:  '--orange',
      bg:       '--surface',
      text:     '--text',
    };
    function hexToRgb(h){
      h = h.replace('#','');
      if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
      var n=parseInt(h,16);
      return [(n>>16)&255,(n>>8)&255,n&255];
    }
    function shade(rgb,amt){
      return rgb.map(function(c){return Math.max(0,Math.min(255,c+amt));});
    }
    function toHex(rgb){
      return '#'+rgb.map(function(c){return ('0'+c.toString(16)).slice(-2);}).join('');
    }
    function luminance(rgb){
      return (0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2])/255;
    }
    var s = document.documentElement.style;
    var primary = p.get('primary');
    if(primary){
      if(primary.charAt(0)!=='#') primary='#'+primary;
      var rgb = hexToRgb(primary);
      s.setProperty('--orange', primary);
      s.setProperty('--orange-dark', toHex(shade(rgb,-20)));
      s.setProperty('--orange-darker', toHex(shade(rgb,-50)));
      s.setProperty('--cream', toHex(shade(rgb,200)));
      s.setProperty('--cream-2', toHex(shade(rgb,180)));
      s.setProperty('--ink', toHex(shade(rgb,-140)));
    }
    var bg = p.get('bg');
    if(bg){
      if(bg.charAt(0)!=='#') bg='#'+bg;
      s.setProperty('--surface', bg);
      var bgRgb = hexToRgb(bg);
      if(luminance(bgRgb)<0.5){
        s.setProperty('--border', toHex(shade(bgRgb,40)));
        s.setProperty('--border-strong', toHex(shade(bgRgb,60)));
        if(!p.get('text')){
          s.setProperty('--text', '#e4e4e7');
          s.setProperty('--text-muted', '#a1a1aa');
        }
      }
    }
    var txt = p.get('text');
    if(txt){
      if(txt.charAt(0)!=='#') txt='#'+txt;
      s.setProperty('--text', txt);
      s.setProperty('--text-muted', txt);
    }
  })();
  </script>
</head>
<body class="embed">

  <main class="wrap" style="padding:12px;max-width:400px">

    <section class="generator" aria-label="Générateur de prénoms de chien">

      <fieldset class="field">
        <legend class="label">Sexe <span class="req" aria-hidden="true">*</span></legend>
        <div class="sex-group">
          <button type="button" id="sex-male" class="sex-btn" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="14" r="5"/><path d="M19 5l-5.4 5.4M19 5h-4M19 5v4"/></svg>
            Mâle
          </button>
          <button type="button" id="sex-female" class="sex-btn" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="9" r="5"/><path d="M12 14v7M9 18h6"/></svg>
            Femelle
          </button>
        </div>
      </fieldset>

      <div class="field">
        <label class="label" for="theme">Thème <span class="opt">(optionnel)</span></label>
        <select id="theme"><option value="">Tous les thèmes</option></select>
      </div>

      <div class="field">
        <label class="label" for="letter">
          Lettre <span class="opt">(optionnel)</span>
          <span class="badge">2026 : B</span>
        </label>
        <select id="letter"><option value="">Toutes les lettres</option></select>
      </div>

      <button type="button" id="generate" class="btn-primary">Générer 4 prénoms</button>

      <output id="result" class="result" aria-live="polite">
        <p class="hint">Choisis un sexe, puis clique sur Générer.</p>
      </output>

      <div id="actions" class="actions">
        <button type="button" id="again" class="btn-again">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
          4 autres prénoms
        </button>
      </div>

    </section>

    <p class="embed-credit">
      <a href="https://prenom-chien.com/" target="_blank" rel="noopener">Générateur par prénom-chien.com 🐾</a>
    </p>

  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
